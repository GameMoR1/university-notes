services:
  # ── MinIO (S3-совместимое хранилище файлов) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: usuz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-yS.FV3eroR-=m](OraH-?acsemSVrs,E}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── База данных PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: usuz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-L!]1*imsyd.MF]n&q!4lUZ^8RC!%m+_p}
      POSTGRES_DB: ${POSTGRES_DB:-university_notes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notes_user} -d ${POSTGRES_DB:-university_notes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  backend:
    image: docker.io/gamemor1/university_notes:latest
    container_name: usuz-backend
    restart: unless-stopped
    environment:
      TEST: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-notes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-L!]1*imsyd.MF]n&q!4lUZ^8RC!%m+_p}
      POSTGRES_DB: ${POSTGRES_DB:-university_notes}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-yS.FV3eroR-=m](OraH-?acsemSVrs,E}
      MINIO_BUCKET: ${MINIO_BUCKET:-usuz-files}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:7009}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@university.ru}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      ADMIN_NAME: ${ADMIN_NAME:-Администратор}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_data:/app/data

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    image: docker.io/gamemor1/university_notes_front:latest
    container_name: usuz-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-7009}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
  minio_data:
